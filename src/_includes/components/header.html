<header class="site-header" id="site-header">
  <div class="container">
    <div class="site-header__inner">
      <a class="site-header__logo" href="/">
        Thunder
        <span>Kitty</span>
      </a>
      <nav class="site-header__nav">
        <a href="/#how-it-works" class="site-header__nav-link">How it works</a>
        <a href="/#pricing" class="site-header__nav-link">Pricing</a>
        <a href="/manifesto" class="site-header__nav-link">Manifesto</a>
        <a href="/download/" class="site-header__cta">Download</a>
      </nav>
    </div>
  </div>
</header>
<script>
  (function () {
    var banner = document.querySelector(".brag-banner");
    var header = document.getElementById("site-header");
    if (!banner || !header) return;
    new IntersectionObserver(
      function (entries) {
        header.classList.toggle(
          "site-header--compact",
          !entries[0].isIntersecting
        );
      },
      { rootMargin: "-20px 0px 0px 0px" }
    ).observe(banner);
  })();
</script>
